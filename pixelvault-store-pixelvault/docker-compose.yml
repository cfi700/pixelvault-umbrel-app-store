services:
  app_proxy:
    image: getumbrel/umbrel-app-proxy:1.1.2
    environment:
      APP_HOST: pixelvault-store-pixelvault_web_1
      APP_PORT: 3000
      PROXY_AUTH_ADD: "false"

  web:
    image: cfi700/pixelvault:0.5-beta
    restart: on-failure
    stop_grace_period: 1m
    volumes:
      - ${APP_DATA_DIR}/data:/data
    environment:
      - ENCRYPTION_KEY=${APP_SEED}
      - SESSION_SECRET=${APP_PASSWORD}
      - PORT=3000
      - DATA_DIR=/data
      - NODE_ENV=production
