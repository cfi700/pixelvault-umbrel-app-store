manifestVersion: 1
id: pixelvault-store-pixelvault
category: files
name: PixelVault
version: "0.5-beta"
tagline: Encrypted & private photo vault
description: >-
  PixelVault stores your photos AES-256 encrypted on your Umbrel.
  All images are encrypted server-side – neither originals nor
  thumbnails are stored in plain text on disk.

  Features:

  - AES-256-CBC encryption for all photos and thumbnails

  - Album and sub-album structure with unlimited depth

  - User management with per-album access control

  - Download protection: only the owner can download originals

  - DE / EN language toggle

  Default login: admin / admin (change immediately!)

releaseNotes: >-
  0.5 Beta: Initial release with encrypted photo storage,
  album/sub-album structure, user management and granular
  per-album access rights.
developer: PixelVault
website: https://github.com/cfi700/pixelvault-umbrel-app-store
dependencies: []
repo: https://github.com/cfi700/pixelvault-umbrel-app-store
support: https://github.com/cfi700/pixelvault-umbrel-app-store/issues
port: 3769
gallery: []
path: ""
defaultUsername: admin
defaultPassword: admin
