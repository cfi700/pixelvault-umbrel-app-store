<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PixelVault</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap');

  :root {
    --bg:       #0d0d0f;
    --surface:  #151518;
    --surface2: #1c1c21;
    --border:   #2a2a32;
    --accent:   #c8a96e;
    --accent2:  #e8c98a;
    --text:     #e8e6e0;
    --muted:    #7a7872;
    --dim:      #3a3835;
    --danger:   #c0534a;
    --r:        8px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}

  /* ── LOGIN ── */
  #login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(ellipse 80% 40% at 50% -10%,#1e160a 0%,var(--bg) 70%);position:relative}
  .lang-toggle-login{position:absolute;top:20px;right:20px}
  .login-card{width:360px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:48px 40px}
  .login-logo{text-align:center;margin-bottom:40px}
  .login-logo .icon{font-size:40px;display:block;margin-bottom:14px}
  .login-logo h1{font-family:'DM Serif Display',serif;font-size:30px;color:var(--accent);letter-spacing:-.5px}
  .login-logo p{color:var(--muted);font-size:11px;margin-top:5px;letter-spacing:2px;text-transform:uppercase}

  /* ── LANG TOGGLE ── */
  .lang-toggle{display:flex;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:3px;flex-shrink:0}
  .lang-btn{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:16px;border:none;
    background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;
    cursor:pointer;transition:all .15s;white-space:nowrap;line-height:1}
  .lang-btn .flag{font-size:14px}
  .lang-btn.active{background:var(--accent);color:#0d0c08}
  .lang-btn:not(.active):hover{color:var(--text)}

  /* ── FORM ── */
  .form-group{margin-bottom:16px}
  label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:7px;font-weight:500}
  input[type=text],input[type=password],select,textarea{width:100%;background:var(--surface2);border:1px solid var(--border);
    border-radius:var(--r);padding:10px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .2s}
  input:focus,select:focus,textarea:focus{border-color:var(--accent)}
  select option{background:var(--surface2)}
  textarea{resize:vertical;min-height:70px}

  /* ── BUTTONS ── */
  .btn{display:inline-flex;align-items:center;gap:7px;padding:9px 16px;border-radius:var(--r);border:none;
    font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap}
  .btn-primary{background:var(--accent);color:#0d0c08;font-weight:600;justify-content:center}
  .btn-primary:hover{background:var(--accent2)}
  .btn-full{width:100%;padding:12px;font-size:14px}
  .btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
  .btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
  .btn-danger{background:transparent;color:var(--danger);border:1px solid rgba(192,83,74,.3)}
  .btn-danger:hover{background:rgba(192,83,74,.1)}
  .btn-sm{padding:5px 11px;font-size:12px}
  .btn-xs{padding:3px 8px;font-size:11px}

  .error-msg{background:rgba(192,83,74,.1);border:1px solid rgba(192,83,74,.3);color:#e07870;
    padding:10px 14px;border-radius:var(--r);margin-top:12px;font-size:13px}

  /* ── NAVBAR ── */
  #app{display:none;min-height:100vh}
  .navbar{height:56px;background:var(--surface);border-bottom:1px solid var(--border);
    display:flex;align-items:center;padding:0 24px;gap:20px;position:sticky;top:0;z-index:100}
  .navbar-brand{font-family:'DM Serif Display',serif;font-size:20px;color:var(--accent);flex-shrink:0}
  .navbar-nav{display:flex;gap:2px;flex:1}
  .nav-btn{padding:6px 13px;border-radius:6px;border:none;background:transparent;color:var(--muted);
    font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all .15s;font-weight:500}
  .nav-btn:hover{background:var(--surface2);color:var(--text)}
  .nav-btn.active{background:var(--surface2);color:var(--accent)}
  .navbar-right{display:flex;align-items:center;gap:10px;margin-left:auto}
  .user-info{font-size:12px;color:var(--muted)}
  .user-info strong{color:var(--accent)}
  .admin-pill{background:rgba(200,169,110,.15);color:var(--accent);font-size:10px;padding:2px 7px;
    border-radius:20px;text-transform:uppercase;letter-spacing:.5px;font-weight:600;border:1px solid rgba(200,169,110,.2)}

  /* ── PAGES ── */
  .page{display:none;padding:28px 24px;max-width:1500px;margin:0 auto}
  .page.active{display:block}
  .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
  .page-title{font-family:'DM Serif Display',serif;font-size:24px}
  .enc-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;background:rgba(200,169,110,.1);
    color:var(--accent);padding:2px 8px;border-radius:20px;border:1px solid rgba(200,169,110,.2);
    font-family:'DM Sans',sans-serif;font-weight:500;vertical-align:middle;margin-left:8px}

  /* ── ALBUM BROWSER ── */
  .albums-layout{display:flex;gap:20px;min-height:calc(100vh - 160px)}

  /* Sidebar tree */
  .album-sidebar{width:260px;flex-shrink:0;background:var(--surface);border:1px solid var(--border);
    border-radius:12px;padding:12px;display:flex;flex-direction:column;gap:4px;overflow-y:auto;max-height:calc(100vh - 160px)}
  .album-sidebar-header{padding:6px 8px;font-size:11px;text-transform:uppercase;letter-spacing:1px;
    color:var(--muted);font-weight:500;display:flex;align-items:center;justify-content:space-between}
  .tree-node{display:flex;align-items:center;gap:0;border-radius:7px;cursor:pointer;transition:background .12s;position:relative}
  .tree-node:hover{background:var(--surface2)}
  .tree-node.active{background:rgba(200,169,110,.12)}
  .tree-node.active .tree-label{color:var(--accent)}
  .tree-indent{flex-shrink:0}
  .tree-toggle{width:20px;height:32px;display:flex;align-items:center;justify-content:center;
    flex-shrink:0;color:var(--muted);font-size:10px;cursor:pointer;border:none;background:transparent}
  .tree-icon{font-size:15px;flex-shrink:0;padding:0 4px}
  .tree-label{flex:1;padding:6px 4px 6px 0;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tree-count{font-size:10px;color:var(--muted);padding-right:8px;flex-shrink:0}
  .tree-actions{display:none;gap:2px;padding-right:6px;flex-shrink:0}
  .tree-node:hover .tree-actions{display:flex}
  .tree-action-btn{padding:2px 5px;border-radius:4px;border:none;background:transparent;
    color:var(--muted);cursor:pointer;font-size:12px;transition:all .12s}
  .tree-action-btn:hover{background:var(--border);color:var(--text)}

  /* Main content area */
  .album-content{flex:1;min-width:0;display:flex;flex-direction:column;gap:16px}
  .album-content-header{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .breadcrumb{display:flex;align-items:center;gap:4px;font-size:13px;flex:1;min-width:0;flex-wrap:wrap}
  .breadcrumb-item{color:var(--muted);cursor:pointer;transition:color .15s;white-space:nowrap}
  .breadcrumb-item:hover{color:var(--accent)}
  .breadcrumb-item.current{color:var(--text);cursor:default;font-weight:500}
  .breadcrumb-sep{color:var(--dim)}

  /* Upload drop zone */
  .upload-zone{border:2px dashed var(--border);border-radius:12px;padding:36px 24px;text-align:center;
    transition:all .2s;cursor:pointer;background:var(--surface)}
  .upload-zone:hover,.upload-zone.dragover{border-color:var(--accent);background:rgba(200,169,110,.04)}
  .upload-zone .u-icon{font-size:36px;margin-bottom:10px}
  .upload-zone h3{font-size:14px;margin-bottom:6px;font-weight:500}
  .upload-zone p{color:var(--muted);font-size:12px;line-height:1.6}
  #file-input{display:none}
  .upload-progress{display:none;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 20px}
  .progress-wrap{background:var(--surface2);border-radius:100px;height:5px;margin-top:10px}
  .progress-bar{height:100%;background:var(--accent);border-radius:100px;width:0%;transition:width .3s}

  /* Photo grid */
  .photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px}
  .photo-card{background:var(--surface);border:1px solid var(--border);border-radius:9px;overflow:hidden;transition:transform .15s}
  .photo-card:hover{transform:translateY(-2px)}
  .photo-thumb{width:100%;aspect-ratio:1;object-fit:cover;background:var(--surface2);display:block;cursor:pointer}
  .thumb-placeholder{width:100%;aspect-ratio:1;background:var(--surface2);display:flex;align-items:center;
    justify-content:center;font-size:28px;color:var(--dim);cursor:pointer}
  .thumb-loading{animation:pulse 1.5s infinite}
  @keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
  .photo-info{padding:8px 10px}
  .photo-name{font-size:11px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
  .photo-meta{font-size:10px;color:var(--muted);display:flex;justify-content:space-between;align-items:center}
  .owner-tag{font-size:9px;background:var(--surface2);padding:1px 5px;border-radius:3px;border:1px solid var(--border)}
  .photo-actions{display:flex;gap:4px;padding:6px 8px;border-top:1px solid var(--border)}

  /* Placeholder states */
  .empty-state{text-align:center;padding:56px 24px;color:var(--muted)}
  .empty-state .e-icon{font-size:44px;margin-bottom:14px}
  .empty-state p{font-size:14px}
  .no-album-selected{display:flex;align-items:center;justify-content:center;flex:1;flex-direction:column;
    gap:16px;color:var(--muted);text-align:center;padding:48px}
  .no-album-selected .big-icon{font-size:56px;opacity:.4}

  /* ── LIGHTBOX ── */
  #lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:1000;
    align-items:center;justify-content:center;padding:20px;cursor:zoom-out}
  #lightbox.open{display:flex}
  #lightbox-img{max-width:92vw;max-height:90vh;object-fit:contain;border-radius:8px;cursor:default;box-shadow:0 32px 80px rgba(0,0,0,.8)}
  .lb-close{position:fixed;top:18px;right:18px;background:var(--surface);border:1px solid var(--border);
    color:var(--text);width:36px;height:36px;border-radius:50%;display:flex;align-items:center;
    justify-content:center;cursor:pointer;font-size:18px;z-index:1001}

  /* ── TABLE ── */
  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:20px}
  .card-header{padding:13px 18px;background:var(--surface2);border-bottom:1px solid var(--border);
    font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:500}
  table{width:100%;border-collapse:collapse}
  th{padding:10px 16px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:1px;
    color:var(--muted);background:var(--surface2);font-weight:500;border-bottom:1px solid var(--border)}
  td{padding:10px 16px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:rgba(255,255,255,.015)}
  .td-actions{display:flex;gap:6px;align-items:center;flex-wrap:wrap}

  /* ── MODAL ── */
  .modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:500;
    align-items:center;justify-content:center;padding:20px}
  .modal-backdrop.open{display:flex}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px;width:460px;max-width:100%}
  .modal-lg{width:600px}
  .modal h2{font-family:'DM Serif Display',serif;font-size:20px;margin-bottom:22px}
  .modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:22px}

  /* Permission tree in modal */
  .perm-tree{max-height:300px;overflow-y:auto;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:6px}
  .perm-album-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;cursor:pointer;font-size:13px}
  .perm-album-item:hover{background:rgba(255,255,255,.04)}
  .perm-album-item input[type=checkbox]{width:auto;accent-color:var(--accent);cursor:pointer;flex-shrink:0}
  .perm-album-owner{font-size:10px;color:var(--muted);margin-left:auto;flex-shrink:0}
  .perm-album-indent{flex-shrink:0}

  /* ── ACCOUNT ── */
  #page-account .card{max-width:440px}

  /* ── TOAST ── */
  #toast{position:fixed;bottom:24px;right:24px;background:var(--surface);border:1px solid var(--border);
    border-radius:10px;padding:12px 18px;font-size:13px;z-index:2000;transform:translateY(80px);opacity:0;
    transition:all .25s cubic-bezier(.4,0,.2,1);max-width:300px;pointer-events:none}
  #toast.show{transform:none;opacity:1}
  #toast.success{border-color:rgba(90,158,111,.4);color:#80c898}
  #toast.error{border-color:rgba(192,83,74,.4);color:#e07870}

  .actions-row{display:flex;gap:8px;flex-wrap:wrap}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="lang-toggle-login">
    <div class="lang-toggle">
      <button class="lang-btn" id="lang-login-de" onclick="setLang('de')"><span class="flag">🇩🇪</span> DE</button>
      <button class="lang-btn" id="lang-login-en" onclick="setLang('en')"><span class="flag">🇬🇧</span> EN</button>
    </div>
  </div>
  <div class="login-card">
    <div class="login-logo">
      <span class="icon">🔐</span>
      <h1>PixelVault</h1>
      <p data-i18n="login.tagline"></p>
    </div>
    <div class="form-group">
      <label data-i18n="login.username"></label>
      <input type="text" id="l-user" data-i18n-ph="login.username" autocomplete="username">
    </div>
    <div class="form-group">
      <label data-i18n="login.password"></label>
      <input type="password" id="l-pass" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn btn-primary btn-full" onclick="doLogin()" data-i18n="login.submit"></button>
    <div id="login-err" class="error-msg" style="display:none"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <nav class="navbar">
    <div class="navbar-brand">🔐 PixelVault</div>
    <div class="navbar-nav">
      <button class="nav-btn active" id="nav-albums"  onclick="showPage('albums')"  data-i18n="nav.albums"></button>
      <button class="nav-btn"        id="nav-users"   onclick="showPage('users')"   data-i18n="nav.users" style="display:none"></button>
      <button class="nav-btn"        id="nav-account" onclick="showPage('account')" data-i18n="nav.account"></button>
    </div>
    <div class="navbar-right">
      <span class="user-info" id="logged-in-label"></span>
      <span class="admin-pill" id="admin-pill" style="display:none">Admin</span>
      <div class="lang-toggle">
        <button class="lang-btn" id="lang-app-de" onclick="setLang('de')"><span class="flag">🇩🇪</span> DE</button>
        <button class="lang-btn" id="lang-app-en" onclick="setLang('en')"><span class="flag">🇬🇧</span> EN</button>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="doLogout()" data-i18n="nav.logout"></button>
    </div>
  </nav>

  <!-- ALBUMS PAGE -->
  <div class="page active" id="page-albums">
    <div class="page-header">
      <h2 class="page-title"><span data-i18n="albums.title"></span><span class="enc-badge">🔒 AES-256</span></h2>
      <div class="actions-row">
        <button class="btn btn-ghost btn-sm" onclick="loadAlbums()" data-i18n="btn.refresh"></button>
        <button class="btn btn-primary btn-sm" onclick="openNewAlbumModal(null)" data-i18n="albums.new_root"></button>
      </div>
    </div>
    <div class="albums-layout">
      <!-- Sidebar tree -->
      <div class="album-sidebar" id="album-sidebar">
        <div class="album-sidebar-header">
          <span data-i18n="albums.sidebar_title"></span>
        </div>
        <div id="album-tree-root"></div>
      </div>
      <!-- Main content -->
      <div class="album-content" id="album-content">
        <div class="no-album-selected">
          <div class="big-icon">📁</div>
          <p data-i18n="albums.select_hint"></p>
        </div>
      </div>
    </div>
  </div>

  <!-- USERS PAGE (admin) -->
  <div class="page" id="page-users">
    <div class="page-header">
      <h2 class="page-title" data-i18n="users.title"></h2>
      <button class="btn btn-primary btn-sm" onclick="openNewUserModal()" data-i18n="users.new"></button>
    </div>
    <div class="card">
      <table>
        <thead><tr>
          <th data-i18n="users.col.username"></th>
          <th data-i18n="users.col.role"></th>
          <th data-i18n="users.col.created"></th>
          <th data-i18n="users.col.album_access"></th>
          <th data-i18n="users.col.actions"></th>
        </tr></thead>
        <tbody id="users-tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- ACCOUNT PAGE -->
  <div class="page" id="page-account">
    <div class="page-header"><h2 class="page-title" data-i18n="account.title"></h2></div>
    <div class="card">
      <div class="card-header" data-i18n="account.changepw"></div>
      <div style="padding:20px">
        <div class="form-group"><label data-i18n="account.current_pw"></label><input type="password" id="pw-current" data-i18n-ph="account.current_pw"></div>
        <div class="form-group"><label data-i18n="account.new_pw"></label><input type="password" id="pw-new" data-i18n-ph="account.pw_min"></div>
        <div class="form-group"><label data-i18n="account.confirm_pw"></label><input type="password" id="pw-confirm" placeholder="••••••••"></div>
        <button class="btn btn-primary" onclick="changePassword()" data-i18n="account.changepw_btn"></button>
      </div>
    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img" src="" alt="" onclick="event.stopPropagation()">
  <button class="lb-close" onclick="closeLightbox()">✕</button>
</div>

<!-- MODAL: New/Edit Album -->
<div class="modal-backdrop" id="modal-album">
  <div class="modal">
    <h2 id="modal-album-title"></h2>
    <div class="form-group">
      <label data-i18n="album.name"></label>
      <input type="text" id="album-name" data-i18n-ph="album.name_placeholder">
    </div>
    <div class="form-group">
      <label data-i18n="album.description"></label>
      <textarea id="album-desc" rows="2" data-i18n-ph="album.desc_placeholder"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-album')" data-i18n="btn.cancel"></button>
      <button class="btn btn-primary" id="album-modal-confirm" data-i18n="btn.save"></button>
    </div>
  </div>
</div>

<!-- MODAL: New User -->
<div class="modal-backdrop" id="modal-new-user">
  <div class="modal">
    <h2 data-i18n="modal.newuser.title"></h2>
    <div class="form-group"><label data-i18n="login.username"></label><input type="text" id="nu-name" placeholder="max.mustermann"></div>
    <div class="form-group"><label data-i18n="login.password"></label><input type="password" id="nu-pass" data-i18n-ph="account.pw_min"></div>
    <div class="form-group">
      <label data-i18n="modal.newuser.role"></label>
      <select id="nu-role">
        <option value="user"  data-i18n="role.user"></option>
        <option value="admin" data-i18n="role.admin"></option>
      </select>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-new-user')" data-i18n="btn.cancel"></button>
      <button class="btn btn-primary" onclick="createUser()" data-i18n="btn.create"></button>
    </div>
  </div>
</div>

<!-- MODAL: Album Permissions -->
<div class="modal-backdrop" id="modal-album-perm">
  <div class="modal modal-lg">
    <h2 data-i18n="modal.albumperm.title"></h2>
    <p style="color:var(--muted);font-size:13px;margin-bottom:14px">
      <span data-i18n="modal.albumperm.desc"></span>
      <strong id="albumperm-uname" style="color:var(--text)"></strong>
      <span data-i18n="modal.albumperm.desc2"></span>
    </p>
    <div class="perm-tree" id="album-perm-tree"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-album-perm')" data-i18n="btn.cancel"></button>
      <button class="btn btn-primary" onclick="saveAlbumPermissions()" data-i18n="btn.save"></button>
    </div>
  </div>
</div>

<!-- MODAL: Reset PW -->
<div class="modal-backdrop" id="modal-reset-pw">
  <div class="modal">
    <h2 data-i18n="modal.resetpw.title"></h2>

// ── i18n ───────────────────────────────────────────────────────────
let lang = localStorage.getItem('pv_lang') || (navigator.language.startsWith('de') ? 'de' : 'en');
function t(key, ...a) {
  const v = (T[lang]??T.de)[key] ?? T.de[key] ?? key;
  return typeof v === 'function' ? v(...a) : v;
}
function setLang(l) {
  lang = l; localStorage.setItem('pv_lang', l);
  applyTranslations();
  if (me) { updateLoggedInLabel(); if (currentAlbumId) loadAlbumContent(currentAlbumId); }
}
function applyTranslations() {
  document.documentElement.lang = lang;
  ['de','en'].forEach(l => {
    ['lang-login-','lang-app-'].forEach(p => {
      const el = document.getElementById(p+l);
      if (el) el.classList.toggle('active', l===lang);
    });
  });
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = t(el.getAttribute('data-i18n'));
    if (typeof v === 'string' && el.children.length === 0) el.textContent = v;
  });
  document.querySelectorAll('[data-i18n-ph]').forEach(el => { el.placeholder = t(el.getAttribute('data-i18n-ph')); });
  document.querySelectorAll('option[data-i18n]').forEach(el => { el.textContent = t(el.getAttribute('data-i18n')); });

}
function updateLoggedInLabel() {

  if (el) el.innerHTML = `<span style="color:var(--muted)">${t('nav.loggedinas')} <strong style="color:var(--accent)">${esc(me.username)}</strong></span>`;

// ── AUTH ───────────────────────────────────────────────────────────
async function doLogin() {
  const username = document.getElementById('l-user').value.trim();
  const password = document.getElementById('l-pass').value;
  const errEl = document.getElementById('login-err');
  errEl.style.display = 'none';
  try {
    const r = await api('POST','/api/login',{username,password});
    if (!r.ok) { errEl.textContent = t('login.err.invalid'); errEl.style.display='block'; return; }
    me = await r.json();
    bootApp();
  } catch { errEl.textContent = t('login.err.connection'); errEl.style.display='block'; }
}
document.getElementById('l-pass').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
async function doLogout() { await fetch('/api/logout',{method:'POST'}); location.reload(); }
async function checkSession() {
  try { const r = await fetch('/api/me'); if(r.ok) { me=await r.json(); bootApp(); } } catch {}
}
function bootApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  if (me.role === 'admin') {
    document.getElementById('admin-pill').style.display = 'inline-block';
    document.getElementById('nav-users').style.display  = 'inline-block';
  }
  applyTranslations();
  loadAlbums();
}

// ── NAVIGATION ─────────────────────────────────────────────────────
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.getElementById('nav-'+name).classList.add('active');
  if (name==='users') loadUsers();
}

// ═══════════════════════════════════════════════════════════════════
// ALBUM TREE
// ═══════════════════════════════════════════════════════════════════
async function loadAlbums() {
  const r = await fetch('/api/albums');
  allAlbums = await r.json();
  renderAlbumTree();
  if (currentAlbumId) loadAlbumContent(currentAlbumId);
}

function albumChildren(parentId) {
  return allAlbums.filter(a => a.parentId === parentId);
}

function renderAlbumTree() {
  const root = document.getElementById('album-tree-root');
  const tops = albumChildren(null);
  if (!tops.length) {
    root.innerHTML = `<div style="padding:8px 10px;color:var(--muted);font-size:12px">${t('albums.no_albums')}</div>`;
    return;
  }
  root.innerHTML = '';
  tops.forEach(a => root.appendChild(buildTreeNode(a, 0)));
}

function buildTreeNode(album, depth) {
  const children = albumChildren(album.id);
  const hasChildren = children.length > 0;
  const isExpanded = expandedAlbums.has(album.id);
  const isActive = currentAlbumId === album.id;

  const wrap = document.createElement('div');

  const node = document.createElement('div');
  node.className = 'tree-node' + (isActive ? ' active' : '');
  node.dataset.albumId = album.id;

  // Indent
  const indent = document.createElement('div');
  indent.className = 'tree-indent';
  indent.style.width = (depth * 16) + 'px';
  node.appendChild(indent);

  // Toggle arrow (for sub-albums)
  const toggle = document.createElement('button');
  toggle.className = 'tree-toggle';
  toggle.textContent = hasChildren ? (isExpanded ? '▾' : '▸') : '';
  toggle.onclick = (e) => { e.stopPropagation(); toggleAlbum(album.id); };
  node.appendChild(toggle);

  // Icon
  const icon = document.createElement('span');
  icon.className = 'tree-icon';
  icon.textContent = hasChildren ? (isExpanded ? '📂' : '📁') : '🖼';
  node.appendChild(icon);

  // Label
  const label = document.createElement('span');
  label.className = 'tree-label';
  label.textContent = album.name;
  node.appendChild(label);

  // Count badge
  const count = document.createElement('span');
  count.className = 'tree-count';
  count.textContent = album.photoCount > 0 ? album.photoCount : '';
  node.appendChild(count);

  // Action buttons (rename + sub-album + delete)
  const acts = document.createElement('div');
  acts.className = 'tree-actions';
  if (album.canManage) {
    const btnSub = document.createElement('button');
    btnSub.className = 'tree-action-btn'; btnSub.title = t('albums.new_sub'); btnSub.textContent = '➕';
    btnSub.onclick = (e) => { e.stopPropagation(); openNewAlbumModal(album.id); };
    acts.appendChild(btnSub);
    const btnRename = document.createElement('button');
    btnRename.className = 'tree-action-btn'; btnRename.title = t('albums.rename'); btnRename.textContent = '✏️';
    btnRename.onclick = (e) => { e.stopPropagation(); openEditAlbumModal(album); };
    acts.appendChild(btnRename);
    const btnDel = document.createElement('button');
    btnDel.className = 'tree-action-btn'; btnDel.title = t('albums.delete'); btnDel.textContent = '🗑';
    btnDel.onclick = (e) => { e.stopPropagation(); deleteAlbum(album.id, album.name); };
    acts.appendChild(btnDel);
  } else if (album.canUpload) {
    // Can upload but not manage (shouldn't happen normally)
  }
  node.appendChild(acts);

  node.addEventListener('click', () => selectAlbum(album.id));
  wrap.appendChild(node);

  // Children container
  if (hasChildren) {
    const childWrap = document.createElement('div');
    childWrap.id = 'tree-children-' + album.id;
    childWrap.style.display = isExpanded ? 'block' : 'none';
    children.forEach(c => childWrap.appendChild(buildTreeNode(c, depth + 1)));
    wrap.appendChild(childWrap);
  }

  return wrap;
}

function toggleAlbum(id) {
  if (expandedAlbums.has(id)) expandedAlbums.delete(id);
  else expandedAlbums.add(id);
  renderAlbumTree();
}

function selectAlbum(id) {
  currentAlbumId = id;
  expandedAlbums.add(id); // auto-expand when selected
  renderAlbumTree();
  loadAlbumContent(id);
}

// ═══════════════════════════════════════════════════════════════════
// ALBUM CONTENT (right panel)
// ═══════════════════════════════════════════════════════════════════
async function loadAlbumContent(albumId) {
  const content = document.getElementById('album-content');
  const album = allAlbums.find(a => a.id === albumId);
  if (!album) return;

  // Build breadcrumb
  const crumbs = buildBreadcrumb(albumId);
  const subAlbums = albumChildren(albumId);

  content.innerHTML = '';

  // Header row
  const hdr = document.createElement('div');
  hdr.className = 'album-content-header';

  const bc = document.createElement('div');
  bc.className = 'breadcrumb';
  crumbs.forEach((c, i) => {
    if (i > 0) { const sep = document.createElement('span'); sep.className='breadcrumb-sep'; sep.textContent='/'; bc.appendChild(sep); }
    const item = document.createElement('span');
    item.className = 'breadcrumb-item' + (i===crumbs.length-1 ? ' current' : '');
    item.textContent = c.name;
    if (i < crumbs.length-1) item.onclick = () => selectAlbum(c.id);
    bc.appendChild(item);
  });
  hdr.appendChild(bc);

  if (album.canManage || album.canUpload) {
    const actRow = document.createElement('div');
    actRow.className = 'actions-row';
    if (album.canManage) {
      const btnSub = document.createElement('button');
      btnSub.className = 'btn btn-ghost btn-sm';
      btnSub.textContent = t('albums.new_sub');
      btnSub.onclick = () => openNewAlbumModal(albumId);
      actRow.appendChild(btnSub);
    }
    hdr.appendChild(actRow);
  }
  content.appendChild(hdr);

  // Sub-albums row
  if (subAlbums.length) {
    const subGrid = document.createElement('div');
    subGrid.style.cssText = 'display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:4px';
    subAlbums.forEach(sub => {
      const subCard = document.createElement('div');
      subCard.style.cssText = 'background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:14px 14px 12px;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;gap:6px';
      subCard.innerHTML = `
        <span style="font-size:28px">${albumChildren(sub.id).length ? '📂' : '📁'}</span>
        <span style="font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${esc(sub.name)}">${esc(sub.name)}</span>
        <span style="font-size:11px;color:var(--muted)">${t('albums.photos_count', sub.photoCount)}</span>`;
      subCard.addEventListener('click', () => selectAlbum(sub.id));
      subCard.addEventListener('mouseenter', () => subCard.style.transform='translateY(-2px)');
      subCard.addEventListener('mouseleave', () => subCard.style.transform='');
      subGrid.appendChild(subCard);
    });
    content.appendChild(subGrid);
  }

  // Upload zone (only for owners/admin)
  if (album.canUpload) {
    const uz = document.createElement('div');
    uz.className = 'upload-zone';
    uz.id = 'upload-zone';
    uz.innerHTML = `<div class="u-icon">📤</div><h3>${t('upload.zone.title')}</h3><p>${t('upload.zone.hint')}</p>`;
    uz.onclick = () => document.getElementById('file-input').click();
    uz.addEventListener('dragover', ev_dragover);
    uz.addEventListener('dragleave', () => uz.classList.remove('dragover'));
    uz.addEventListener('drop', ev_drop);
    content.appendChild(uz);

    const fi = document.createElement('input');
    fi.type='file'; fi.id='file-input'; fi.multiple=true; fi.accept='image/*';
    fi.style.display='none';
    fi.onchange = () => handleFiles(fi.files);
    content.appendChild(fi);

    const prog = document.createElement('div');
    prog.className='upload-progress'; prog.id='upload-progress';
    prog.innerHTML = `<div id="upload-status"></div><div class="progress-wrap"><div class="progress-bar" id="progress-bar"></div></div>`;
    content.appendChild(prog);
  }

  // Photos
  const photosWrap = document.createElement('div');
  photosWrap.id = 'photos-wrap';
  photosWrap.innerHTML = `<div class="empty-state"><div class="e-icon">⏳</div><p>${t('gallery.loading')}</p></div>`;
  content.appendChild(photosWrap);

  loadPhotos(albumId, photosWrap);
}

function buildBreadcrumb(albumId) {
  const crumbs = [];
  let cur = allAlbums.find(a => a.id === albumId);
  while (cur) {
    crumbs.unshift({ id: cur.id, name: cur.name });
    cur = cur.parentId ? allAlbums.find(a => a.id === cur.parentId) : null;
  }
  return crumbs;
}

async function loadPhotos(albumId, wrap) {
  try {
    const r = await fetch(`/api/albums/${albumId}/photos`);
    const photos = await r.json();
    if (!photos.length) {
      wrap.innerHTML = `<div class="empty-state"><div class="e-icon">📷</div><p>${t('albums.empty')}</p></div>`;
      return;
    }
    wrap.innerHTML = '<div class="photo-grid" id="photo-grid"></div>';
    const grid = document.getElementById('photo-grid');
    photos.forEach(p => {
      const isOwn = p.ownerId === me.id;
      const card = document.createElement('div');
      card.className = 'photo-card';
      card.innerHTML = `
        <div class="thumb-placeholder thumb-loading" id="tp-${p.id}">🖼</div>
        <div class="photo-info">
          <div class="photo-name" title="${esc(p.originalName)}">${esc(p.originalName)}</div>
          <div class="photo-meta">
            <span>${fmtDate(p.uploadedAt)}</span>
            ${!isOwn ? `<span class="owner-tag">${esc(p.ownerName)}</span>` : ''}
          </div>
        </div>
        <div class="photo-actions">
          ${p.canDownload ? `<button class="btn btn-ghost btn-xs" onclick="dlPhoto('${p.id}','${esc(p.originalName)}')">⬇</button>` : ''}
          ${(isOwn||me.role==='admin') ? `<button class="btn btn-danger btn-xs" onclick="delPhoto('${p.id}',this)">🗑</button>` : ''}
        </div>`;
      card.querySelector('.thumb-placeholder').addEventListener('click', () => openLightbox(p.id));
      grid.appendChild(card);
      loadThumb(p.id);
    });
  } catch { wrap.innerHTML = `<div class="empty-state"><p>${t('gallery.error')}</p></div>`; }
}

// ── UPLOAD ─────────────────────────────────────────────────────────
function ev_dragover(e) { e.preventDefault(); document.getElementById('upload-zone')?.classList.add('dragover'); }
function ev_drop(e) {
  e.preventDefault();
  document.getElementById('upload-zone')?.classList.remove('dragover');
  handleFiles(e.dataTransfer.files);
}

async function handleFiles(files) {
  if (!files.length || !currentAlbumId) return;
  const prog = document.getElementById('upload-progress');
  const bar  = document.getElementById('progress-bar');
  const stat = document.getElementById('upload-status');
  if (!prog) return;
  prog.style.display='block'; bar.style.width='15%';
  stat.textContent = t('upload.encrypting', files.length);

  const form = new FormData();
  for (const f of files) form.append('photos', f);
  form.append('albumId', currentAlbumId);

  try {
    bar.style.width = '50%';
    const r = await fetch('/api/photos/upload', {method:'POST', body:form});
    bar.style.width = '100%';
    const data = await r.json();
    if (r.ok) {
      stat.textContent = t('upload.done', data.uploaded.length, data.errors.length);
      toast(t('upload.toast', data.uploaded.length), 'success');
      loadAlbums(); // refresh counts
    } else { stat.textContent = 'Error: ' + data.error; }
    setTimeout(() => { prog.style.display='none'; bar.style.width='0'; }, 4000);
    const fi = document.getElementById('file-input');
    if (fi) fi.value = '';
  } catch { if(stat) stat.textContent = t('upload.fail'); }
}

// ── PHOTOS ─────────────────────────────────────────────────────────
async function loadThumb(id) {
  try {
    const r = await fetch(`/api/photos/${id}/thumb`);
    if (!r.ok) return;
    const url = URL.createObjectURL(await r.blob());
    const ph = document.getElementById(`tp-${id}`);
    if (!ph) return;
    const img = document.createElement('img');
    img.className='photo-thumb'; img.src=url; img.alt='';
    img.addEventListener('click', () => openLightbox(id));
    ph.replaceWith(img);
  } catch {}
}

async function openLightbox(id) {
  const r = await fetch(`/api/photos/${id}/thumb`);
  if (!r.ok) return;
  document.getElementById('lightbox-img').src = URL.createObjectURL(await r.blob());
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  const img = document.getElementById('lightbox-img');
  URL.revokeObjectURL(img.src); img.src='';
}
function dlPhoto(id, name) {
  const a = document.createElement('a'); a.href=`/api/photos/${id}/download`; a.download=name;
  document.body.appendChild(a); a.click(); a.remove();
}
async function delPhoto(id, btn) {
  if (!confirm(t('photo.delete_confirm'))) return;
  btn.disabled = true;
  const r = await fetch(`/api/photos/${id}`, {method:'DELETE'});
  if (r.ok) { toast(t('photo.deleted'),'success'); loadAlbums(); loadAlbumContent(currentAlbumId); }
  else { toast((await r.json()).error,'error'); btn.disabled=false; }
}

// ═══════════════════════════════════════════════════════════════════
// ALBUM CRUD
// ═══════════════════════════════════════════════════════════════════
function openNewAlbumModal(parentId) {
  albumModalMode = 'create';
  albumModalParentId = parentId;
  const parentAlbum = parentId ? allAlbums.find(a => a.id === parentId) : null;
  document.getElementById('modal-album-title').textContent =
    parentAlbum ? t('album.new_sub_title', parentAlbum.name) : t('album.new_title');
  document.getElementById('album-name').value = '';
  document.getElementById('album-desc').value = '';
  document.getElementById('album-modal-confirm').textContent = t('btn.create');
  document.getElementById('album-modal-confirm').onclick = doCreateAlbum;
  document.getElementById('modal-album').classList.add('open');
  setTimeout(() => document.getElementById('album-name').focus(), 50);
}

function openEditAlbumModal(album) {
  albumModalMode = 'edit';
  albumModalEditId = album.id;
  document.getElementById('modal-album-title').textContent = t('album.edit_title', album.name);
  document.getElementById('album-name').value = album.name;
  document.getElementById('album-desc').value = album.description || '';
  document.getElementById('album-modal-confirm').textContent = t('btn.save');
  document.getElementById('album-modal-confirm').onclick = doEditAlbum;
  document.getElementById('modal-album').classList.add('open');
  setTimeout(() => document.getElementById('album-name').focus(), 50);
}

async function doCreateAlbum() {
  const name = document.getElementById('album-name').value.trim();
  const description = document.getElementById('album-desc').value.trim();
  if (!name) return;
  const r = await api('POST', '/api/albums', { name, description, parentId: albumModalParentId });
  if (r.ok) {
    const album = await r.json();
    closeModal('modal-album');
    toast(t('albums.created'), 'success');
    await loadAlbums();
    expandedAlbums.add(albumModalParentId || album.id);
    selectAlbum(album.id);
  } else { toast((await r.json()).error, 'error'); }
}

async function doEditAlbum() {
  const name = document.getElementById('album-name').value.trim();
  const description = document.getElementById('album-desc').value.trim();
  if (!name) return;
  const r = await api('PUT', `/api/albums/${albumModalEditId}`, { name, description });
  if (r.ok) { closeModal('modal-album'); toast(t('albums.updated'),'success'); loadAlbums(); }
  else toast((await r.json()).error, 'error');
}

async function deleteAlbum(id, name) {
  if (!confirm(t('albums.confirm_delete'))) return;
  const r = await fetch(`/api/albums/${id}`, {method:'DELETE'});
  if (r.ok) {
    toast(t('albums.deleted'), 'success');
    if (currentAlbumId === id) {
      currentAlbumId = null;
      document.getElementById('album-content').innerHTML =
        `<div class="no-album-selected"><div class="big-icon">📁</div><p>${t('albums.select_hint')}</p></div>`;
    }
    loadAlbums();
  } else toast((await r.json()).error, 'error');
}

// ═══════════════════════════════════════════════════════════════════
// USER MANAGEMENT
// ═══════════════════════════════════════════════════════════════════
async function loadUsers() {
  const r = await fetch('/api/users');
  allUsers = await r.json();
  const tbody = document.getElementById('users-tbody');
  tbody.innerHTML = allUsers.map(u => {
    const albumCount = (u.canViewAlbums||[]).length;
    const accessLabel = u.role==='admin'
      ? `<span style="color:var(--muted);font-size:12px">${t('users.all_albums')}</span>`
      : `<span style="font-size:12px;color:var(--muted)">${t('users.albums_count', albumCount)}</span>`;
    return `<tr>
      <td><strong>${esc(u.username)}</strong></td>
      <td>${u.role==='admin'?'<span class="admin-pill">Admin</span>':t('role.user')}</td>
      <td>${fmtDate(u.createdAt)}</td>
      <td>
        ${accessLabel}
        ${u.role!=='admin' ? `<button class="btn btn-ghost btn-xs" style="margin-left:8px" onclick="openAlbumPermModal('${u.id}','${esc(u.username)}')">${t('users.album_rights')}</button>` : ''}
      </td>
      <td><div class="td-actions">
        <button class="btn btn-ghost btn-sm" onclick="openResetPw('${u.id}','${esc(u.username)}')">${t('users.reset_pw')}</button>
        ${u.id!==me.id
          ? `<button class="btn btn-danger btn-sm" onclick="deleteUser('${u.id}')">${t('users.delete')}</button>`
          : `<span style="color:var(--muted);font-size:12px">${t('users.me')}</span>`}
      </div></td>
    </tr>`;
  }).join('');
}

function openNewUserModal() {
  ['nu-name','nu-pass'].forEach(id => document.getElementById(id).value='');
  document.getElementById('modal-new-user').classList.add('open');
}
async function createUser() {
  const username = document.getElementById('nu-name').value.trim();
  const password = document.getElementById('nu-pass').value;
  const role     = document.getElementById('nu-role').value;
  if (!username||!password) { toast(t('err.required'),'error'); return; }
  const r = await api('POST','/api/users',{username,password,role});
  const data = await r.json();
  if (r.ok) { toast(t('users.created'),'success'); closeModal('modal-new-user'); loadUsers(); }
  else toast(data.error,'error');
}
async function deleteUser(id) {
  if (!confirm(t('users.confirm_delete'))) return;
  const r = await fetch(`/api/users/${id}`,{method:'DELETE'});
  if (r.ok) { toast(t('users.deleted'),'success'); loadUsers(); }
  else toast((await r.json()).error,'error');
}

// Album permission modal
function openAlbumPermModal(userId, username) {
  albumPermTargetId = userId;
  document.getElementById('albumperm-uname').textContent = username;

  const user = allUsers.find(u => u.id === userId);
  const current = user?.canViewAlbums || [];

  // Build tree of all albums
  const tree = document.getElementById('album-perm-tree');
  tree.innerHTML = renderPermTree(null, 0, current);
  document.getElementById('modal-album-perm').classList.add('open');
}

function renderPermTree(parentId, depth, current) {
  return albumChildren(parentId).map(album => {
    const indent = depth * 16;
    const checked = current.includes(album.id) ? 'checked' : '';
    const children = renderPermTree(album.id, depth+1, current);
    const ownerName = allUsers.find(u => u.id === album.ownerId)?.username ?? '?';
    return `
      <label class="perm-album-item">
        <div class="perm-album-indent" style="width:${indent}px"></div>
        <input type="checkbox" value="${album.id}" ${checked}>
        <span>${esc(album.name)}</span>
        <span class="perm-album-owner">@${esc(ownerName)}</span>
      </label>
      ${children}`;
  }).join('');
}

async function saveAlbumPermissions() {
  const checked = [...document.querySelectorAll('#album-perm-tree input:checked')].map(c => c.value);
  const r = await api('PUT', `/api/users/${albumPermTargetId}/album-permissions`, { canViewAlbums: checked });
  if (r.ok) { toast(t('perm.saved'),'success'); closeModal('modal-album-perm'); loadUsers(); }
  else toast(t('perm.save_err'),'error');
}

function openResetPw(id, username) {
  resetTargetId = id;
  document.getElementById('reset-uname').textContent = username;
  document.getElementById('reset-pw').value = '';
  document.getElementById('modal-reset-pw').classList.add('open');
}
async function doResetPassword() {
  const pw = document.getElementById('reset-pw').value;
  if (!pw||pw.length<6) { toast(t('account.pw_short'),'error'); return; }
  const r = await api('PUT',`/api/users/${resetTargetId}/password`,{password:pw});
  if (r.ok) { toast(t('pw.set'),'success'); closeModal('modal-reset-pw'); }
  else toast((await r.json()).error,'error');
}

// ── ACCOUNT ────────────────────────────────────────────────────────
async function changePassword() {
  const current = document.getElementById('pw-current').value;
  const next    = document.getElementById('pw-new').value;
  const confirm = document.getElementById('pw-confirm').value;
  if (next!==confirm) { toast(t('account.pw_mismatch'),'error'); return; }
  if (next.length<6)  { toast(t('account.pw_short'),'error'); return; }
  const r = await api('PUT','/api/me/password',{currentPassword:current,newPassword:next});
  if (r.ok) { toast(t('account.pw_changed'),'success'); ['pw-current','pw-new','pw-confirm'].forEach(id => document.getElementById(id).value=''); }
  else toast((await r.json()).error,'error');
}

// ── HELPERS ────────────────────────────────────────────────────────
function api(method,url,body) {
  return fetch(url,{method,headers:{'Content-Type':'application/json'},body:body?JSON.stringify(body):undefined});
}
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function toast(msg,type='') {
  const el=document.getElementById('toast');
  el.textContent=msg; el.className=`show ${type}`;
  clearTimeout(toast._t); toast._t=setTimeout(()=>el.className='',3000);
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDate(ts) { return new Date(ts).toLocaleDateString(lang==='de'?'de-DE':'en-GB',{day:'2-digit',month:'2-digit',year:'numeric'}); }

document.addEventListener('keydown', e => { if(e.key==='Escape') { closeLightbox(); } });

// BOOT
applyTranslations();
checkSession();
</script>
